<!doctype html>
<html>
  <head>
    <title>Admin Panel</title>

    <!-- CSS -->
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <h2>Pending Items</h2>
    <table id="pendingTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Location</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Approved Items</h2>
    <table id="approvedTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Location</th>
          <th>Category</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Archived Items</h2>
    <table id="archivedTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Location</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script type="module" src="admin.js"></script>
  </body>
</html>
